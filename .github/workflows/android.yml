name: Android CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: elendheim-ear-trainer-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp app/build/outputs/apk/debug/app-debug.apk "elendheim-ear-trainer-${{ github.ref_name }}.apk"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: elendheim-ear-trainer-*.apk
          body: |
            Installable debug build of Elendheim Ear Trainer.

            Download the APK below, open it on your phone, and allow
            installs from unknown sources when prompted.
