name: Android CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, e.g. v1.0.0. Leave empty for a plain build."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: elendheim-ear-trainer-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Decide release version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release APK
        if: steps.version.outputs.version != ''
        run: cp app/build/outputs/apk/debug/app-debug.apk "elendheim-ear-trainer-${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: elendheim-ear-trainer-*.apk
          body: |
            Installable debug build of Elendheim Ear Trainer.

            Download the APK below, open it on your phone, and allow
            installs from unknown sources when prompted.
